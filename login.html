<!doctype html>
<html lang="vi">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Trang Đăng Nhập & Đăng Ký</title>
	<link rel="stylesheet" href="styles.css" />
</head>

<body>
	<div class="form-box">
		<h2>Đăng Nhập</h2>
		<form action="#" method="POST">
			<div class="input-group">
				<label for="login-user">Tên tài khoản:</label>
				<input type="text" id="login-user" name="username" placeholder="Nhập tên của bạn" required />
			</div>

			<div class="input-group">
				<label for="login-pass">Mật khẩu:</label>
				<input type="password" id="login-pass" name="password" placeholder="Nhập mật khẩu" required />
			</div>

			<button type="submit">Vào Thôi!</button>
		</form>
	</div>

	<div class="form-box">
		<h2>Đăng Ký Mới</h2>
		<form action="#" method="POST">
			<div class="input-group">
				<label for="reg-user">Tên tài khoản:</label>
				<input type="text" id="reg-user" name="username" placeholder="Tạo tên tài khoản" required />
			</div>

			<div class="input-group">
				<label for="reg-pass">Mật khẩu:</label>
				<input type="password" id="reg-pass" name="password" placeholder="Tạo mật khẩu" required />
			</div>

			<div class="input-group">
				<label for="reg-pass-confirm">Xác nhận mật khẩu:</label>
				<input type="password" id="reg-pass-confirm" name="password_confirm" placeholder="Nhập lại mật khẩu" required />
			</div>

			<button type="submit">Tạo Tài Khoản</button>
		</form>
	</div>
</body>

</html>
